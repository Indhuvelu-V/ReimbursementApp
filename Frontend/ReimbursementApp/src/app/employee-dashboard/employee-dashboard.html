<!-- LOGOUT CONFIRMATION MODAL -->
<div class="logout-modal-backdrop" *ngIf="showLogoutConfirm">
  <div class="logout-modal">
    <div class="logout-modal-icon">
      <i class="bi bi-box-arrow-right"></i>
    </div>
    <h5>Confirm Logout</h5>
    <p>Are you sure you want to logout?</p>
    <div class="logout-modal-actions">
      <button class="btn-cancel-logout" (click)="cancelLogout()">
        <i class="bi bi-x me-1"></i>Cancel
      </button>
      <button class="btn-confirm-logout" (click)="confirmLogoutAction($event)">
        <i class="bi bi-box-arrow-right me-1"></i>Logout
      </button>
    </div>
  </div>
</div>

<nav class="navbar navbar-expand-lg navbar-light bg-light mb-3">

  <!-- Brand -->
  <a class="navbar-brand" href="#">
    <i class="bi bi-person-circle me-1"></i>
    Hi 👋 {{ uname() || 'Employee' }}
  </a>

  <!-- Hamburger toggle (mobile) -->
  <button class="navbar-toggler" type="button"
          data-bs-toggle="collapse" data-bs-target="#empNav"
          aria-controls="empNav" aria-expanded="false" aria-label="Toggle navigation">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="empNav">
    <ul class="navbar-nav ms-auto align-items-lg-center">

      <li class="nav-item">
        <a class="nav-link" routerLink="policy" routerLinkActive="active-link">
          <i class="bi bi-file-earmark-text me-1"></i>Policies
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="expense" routerLinkActive="active-link">
          <i class="bi bi-wallet2 me-1"></i>Expenses
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="notifications" routerLinkActive="active-link">
          <i class="bi bi-bell me-1"></i>Notifications
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="expense-categories" routerLinkActive="active-link">
          <i class="bi bi-list-ul me-1"></i>Categories
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="payment" routerLinkActive="active-link">
          <i class="bi bi-cash-stack me-1"></i>Payment
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="employee-data" routerLinkActive="active-link">
          <i class="bi bi-people me-1"></i>Employee Data
        </a>
      </li>

      <!-- Notification bell -->
      <li class="nav-item ms-lg-2">
        <app-notification-bell></app-notification-bell>
      </li>

      <!-- THEME TOGGLE -->
      <li class="nav-item ms-lg-1">
        <button class="theme-toggle-btn" (click)="toggleTheme()"
                [title]="isDark() ? 'Switch to Light' : 'Switch to Dark'">
          <i class="bi" [ngClass]="isDark() ? 'bi-sun-fill' : 'bi-moon-fill'"></i>
        </button>
      </li>

      <!-- LOGOUT → opens confirmation -->
      <li class="nav-item" *ngIf="uname()">
        <a class="nav-link logout-link" href="#" (click)="confirmLogout($event)">
          <i class="bi bi-box-arrow-right me-1"></i>Logout
        </a>
      </li>

    </ul>
  </div>
</nav>

<div class="main-content">
  <router-outlet></router-outlet>
</div>
