<section class="login-section">
  <div class="login-card">

    <!-- ZIP2 style: logo + title -->
    <div class="login-logo">
      <i class="bi bi-currency-rupee"></i>
    </div>
    <h2>Reimbursement Portal</h2>
    <p class="login-sub">Sign in to your account</p>

    <!-- ZIP1 feature: ReactiveForm with validators -->
    <form [formGroup]="loginForm" (ngSubmit)="login()">

      <!-- Username field -->
      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <i class="bi bi-person input-icon"></i>
          <input type="text"
                 formControlName="username"
                 placeholder="Enter username"
                 class="dark-input"
                 [class.input-invalid]="username.invalid && username.touched"
                 [class.input-valid]="username.valid && username.touched" />
        </div>
        <!-- ZIP1 feature: error messages in red -->
        <div class="error-msg" *ngIf="username.touched && username.invalid">
          <span *ngIf="username.errors?.['required']">Username is required</span>
        </div>
      </div>

      <!-- Password field -->
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock input-icon"></i>
          <input [type]="showPassword ? 'text' : 'password'"
                 formControlName="password"
                 placeholder="Enter password (min 6 chars)"
                 class="dark-input"
                 [class.input-invalid]="password.invalid && password.touched"
                 [class.input-valid]="password.valid && password.touched" />
          <button type="button" class="toggle-pw" (click)="togglePassword()">
            <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <!-- ZIP1 feature: error messages in red -->
        <div class="error-msg" *ngIf="password.touched && password.invalid">
          <span *ngIf="password.errors?.['required']">Password is required</span>
          <span *ngIf="password.errors?.['minlength']">Minimum 6 characters required</span>
        </div>
      </div>

      <!-- ZIP2 style: full-width sign in button -->
      <button type="submit"
              class="btn-login"
              [disabled]="loader.isLoading()">
        <ng-container *ngIf="!loader.isLoading()">
          <i class="bi bi-box-arrow-in-right me-2"></i>Login In
        </ng-container>
        <ng-container *ngIf="loader.isLoading()">
          <span class="spinner-border spinner-border-sm me-2"></span>Signing in...
        </ng-container>
      </button>

      <!-- Reset link -->
      <div class="reset-row">
        <button type="button" class="reset-btn" (click)="reset()">Reset</button>
      </div>

    </form>

    <!-- ZIP2 style: register link -->
    <p class="register-link">
      Don't have an account?
      <a routerLink="/register">Register here</a>
    </p>

  </div>
</section>
