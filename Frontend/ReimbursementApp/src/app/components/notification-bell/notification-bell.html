<div class="bell-wrapper">
 
  <!-- Bell button -->
  <div class="bell-container" (click)="toggleDropdown()" title="Notifications">
    <i class="bi bi-bell-fill bell-icon"></i>
    <span *ngIf="unreadCount > 0" class="badge-count">{{ unreadCount }}</span>
  </div>
 
  <!-- Dropdown -->
  <div class="dropdown-box" *ngIf="showDropdown">
 
    <div class="dropdown-header">
      <i class="bi bi-bell me-2"></i>Notifications
      <span *ngIf="unreadCount > 0" class="badge bg-danger ms-2" style="font-size:10px;">{{ unreadCount }}</span>
    </div>
 
    <!-- Empty -->
    <div *ngIf="!notifications.length" class="empty">
      <i class="bi bi-inbox me-1"></i>No notifications
    </div>
 
    <!-- Items -->
    <div *ngFor="let n of notifications"
         class="dropdown-item"
         [ngClass]="accentClass(n)">
      <div class="msg">{{ n.message }}</div>
      <div class="d-flex justify-content-between align-items-center mt-1">
        <small class="time">{{ n.createdAt | date:'short' }}</small>
 
        <!--
          UPDATED: dot logic now uses senderRole to guard green.
          Green (replied) only applies to Manager-sent notifications —
          System auto-notifications (Approved/Paid) never show green.
        -->
        <span class="accent-dot"
              [ngClass]="{
                'dot-blue':  n.readStatus === 'Unread',
                'dot-green': n.reply && n.senderRole === 'Manager',
                'dot-gray':  n.readStatus === 'Read' && !n.reply
              }">
        </span>
      </div>
    </div>
 
    <!-- View All -->
    <div class="view-all" (click)="goToNotifications()">
      <i class="bi bi-list-ul me-1"></i>View All
    </div>
 
  </div>
</div>
