<div class="category-container">

  <h2 class="text-center mb-3">
    <i class="bi bi-list-ul me-2"></i>Expense Categories
  </h2>

  <div class="table-responsive">
    <table class="table table-bordered table-hover">
      <thead>
        <tr>
          <th>Category Id</th>
          <th>Category Name</th>
          <th>Max Limit</th>
          <th *ngIf="isAdmin()">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let category of categories">
          <td>
            <span class="cat-badge">{{ category.categoryId }}</span>
          </td>
          <td>
            <span class="cat-badge">{{ category.categoryName }}</span>
          </td>
          <td class="currency">{{ category.maxLimit | currency:'INR':'symbol':'1.0-0' }}</td>
          <td *ngIf="isAdmin()">
            <button class="btn btn-primary btn-sm" (click)="selectCategory(category)">
              <i class="bi bi-pencil me-1"></i>Edit
            </button>
          </td>
        </tr>
        <tr *ngIf="!categories.length">
          <td colspan="3" class="text-center text-muted">No categories found.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Update Form (Admin only) -->
  <div *ngIf="selectedCategory && isAdmin()" class="card update-card">
    <h5 class="mb-3">
      <i class="bi bi-pencil-square me-2"></i>Update — {{ selectedCategory.categoryName }}
    </h5>

    <div class="mb-3">
      <label class="form-label">New Max Limit (₹)</label>
      <input type="number"
             [(ngModel)]="newMaxLimit"
             class="form-control dark-input"
             [min]="1"
             placeholder="Enter new limit" />
      <small *ngIf="newMaxLimit <= 0" class="text-danger">
        Limit must be greater than zero.
      </small>
    </div>

    <div class="button-group d-flex gap-2 mt-2">
      <button class="btn btn-primary" (click)="updateCategory()" [disabled]="newMaxLimit <= 0">
        <i class="bi bi-save me-1"></i>Update
      </button>
      <button class="btn btn-secondary" (click)="cancelEdit()">
        <i class="bi bi-x-circle me-1"></i>Cancel
      </button>
    </div>
  </div>

</div>
