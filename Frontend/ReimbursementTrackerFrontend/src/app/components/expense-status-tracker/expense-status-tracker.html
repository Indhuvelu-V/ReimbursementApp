<div class="tracker-wrapper">

  <!-- Rejected banner -->
  <div *ngIf="isRejected" class="rejected-banner">
    <i class="bi bi-x-circle-fill"></i>Expense Rejected
  </div>

  <!-- Normal stepper -->
  <div *ngIf="!isRejected" class="tracker">
    <ng-container *ngFor="let step of steps; let i = index; let last = last">
      <div class="step-block">
        <div class="step-circle"
             [class.completed]="isCompleted(i)"
             [class.active]="isActive(i)"
             [class.pending]="isPending(i)">
          <i *ngIf="isCompleted(i)" class="bi bi-check-lg"></i>
          <i *ngIf="!isCompleted(i)" class="bi" [ngClass]="step.icon"></i>
        </div>
        <span class="step-label"
              [class.label-completed]="isCompleted(i)"
              [class.label-active]="isActive(i)"
              [class.label-pending]="isPending(i)">
          {{ step.label }}
        </span>
      </div>
      <div *ngIf="!last" class="connector" [class.connector-done]="isConnectorDone(i)"></div>
    </ng-container>
  </div>

</div>
