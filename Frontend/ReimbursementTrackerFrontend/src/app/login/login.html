<!-- Theme toggle floating button -->
<button class="login-theme-toggle" (click)="toggleTheme()" [title]="themeService.isDark ? 'Switch to Light' : 'Switch to Dark'">
  <i class="bi" [ngClass]="themeService.isDark ? 'bi-sun-fill' : 'bi-moon-stars-fill'"></i>
</button>

<section class="login-section">
  <div class="login-card">

    <div class="login-logo">
      <i class="bi bi-currency-rupee"></i>
    </div>
    <h2>Reimbursement Portal</h2>
    <p class="login-sub">Sign in to your account</p>

    <form [formGroup]="loginForm" (ngSubmit)="login()">

      <!-- Username -->
      <div class="field">
        <label>Username</label>
        <div class="input-wrap">
          <i class="bi bi-person input-icon"></i>
          <input type="text"
                 formControlName="username"
                 placeholder="Enter username"
                 class="dark-input"
                 [class.input-invalid]="username.invalid && username.touched"
                 [class.input-valid]="username.valid && username.touched" />
        </div>
        <div class="error-msg" *ngIf="username.touched && username.invalid">
          <span *ngIf="username.errors?.['required']">Username is required</span>
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <i class="bi bi-lock input-icon"></i>
          <input [type]="showPassword ? 'text' : 'password'"
                 formControlName="password"
                 placeholder="Enter password (min 6 chars)"
                 class="dark-input"
                 [class.input-invalid]="password.invalid && password.touched"
                 [class.input-valid]="password.valid && password.touched" />
          <button type="button" class="toggle-pw" (click)="togglePassword()">
            <i class="bi" [ngClass]="showPassword ? 'bi-eye-slash' : 'bi-eye'"></i>
          </button>
        </div>
        <div class="error-msg" *ngIf="password.touched && password.invalid">
          <span *ngIf="password.errors?.['required']">Password is required</span>
          <span *ngIf="password.errors?.['minlength']">Minimum 6 characters required</span>
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loader.isLoading()">
        <ng-container *ngIf="!loader.isLoading()">
          <i class="bi bi-box-arrow-in-right"></i>Sign In
        </ng-container>
        <ng-container *ngIf="loader.isLoading()">
          <span class="spinner-border spinner-border-sm"></span>Signing in...
        </ng-container>
      </button>

      <div class="reset-row">
        <button type="button" class="reset-btn" (click)="reset()">Reset</button>
      </div>

    </form>

    <p class="register-link">
      Don't have an account? <a routerLink="/register">Register here</a>
    </p>

  </div>
</section>
